name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'
      - 'LICENSE'
      - '.gitignore'
      - 'renovate.json'
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:00 UTC — refreshes apt layer + rustup channel + nvm.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/devcontainer-base-image

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
        with:
          # arm64 is the primary target (Apple Silicon dev machines); QEMU is
          # slow for cargo install but only runs on GHA, not the laptop.
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Tagging convention (per the survey of personal devbases): `latest`
          # on the default branch, a YYYY-MM-DD stamp for human reference, and
          # the short git SHA for digest-style pinning before downstream is
          # ready to switch to @sha256.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYY-MM-DD'}},enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false  # ghcr.io shows attestation manifests as
                             # "unknown/unknown" entries — disable until needed

      - name: Print published image refs
        run: |
          echo "Published:"
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
          echo "Digest: ${{ steps.meta.outputs.version }}"
